<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyToken DApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Reset & Base */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3), transparent 50%),
                  radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3), transparent 50%),
                  radial-gradient(circle at 40% 80%, rgba(120, 219, 255, 0.3), transparent 50%),
                  linear-gradient(135deg, #0f0f23 0%, #1a1a2e 25%, #16213e 50%, #0f3460 75%, #020617 100%);
      background-size: 400% 400%;
      animation: shimmer 10s ease-in-out infinite;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="20" cy="80" r="0.5" fill="rgba(255,255,255,0.05)"/><circle cx="80" cy="20" r="0.5" fill="rgba(255,255,255,0.05)"/></svg>') repeat;
      animation: float 6s ease-in-out infinite;
      pointer-events: none;
    }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseGlow {
      0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); }
      100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes hologram {
      0% { opacity: 0.8; filter: hue-rotate(0deg); }
      50% { opacity: 1; filter: hue-rotate(180deg); }
      100% { opacity: 0.8; filter: hue-rotate(360deg); }
    }

    /* Header */
    header {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
      padding: 1.2rem 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      animation: hologram 8s ease-in-out infinite;
    }

    header h1 { 
      font-size: 1.3rem; 
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(to right, #818cf8, #c084fc, #f472b6);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    header h1 svg {
      width: 24px;
      height: 24px;
      color: #818cf8;
    }

    /* Buttons */
    #connect-btn {
      background: linear-gradient(135deg, #4f46e5, #7c3aed, #ec4899);
      background-size: 200% 200%;
      animation: shimmer 3s ease-in-out infinite, pulseGlow 2s infinite;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 0.6rem 1.4rem;
      border-radius: 99px; /* Pill shape */
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
    }

    #connect-btn:hover:not(:disabled) { 
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
    }

    #connect-btn:disabled {
      background: rgba(30, 41, 59, 0.8);
      color: #38bdf8;
      border-color: rgba(56, 189, 248, 0.3);
      animation: none;
      cursor: default;
    }

    /* Main Container */
    main { 
      flex: 1;
      width: 100%;
      max-width: 480px; 
      margin: 4rem auto; 
      padding: 0 1.5rem; 
    }

    /* Cards */
    .card {
      background: linear-gradient(180deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.8) 100%);
      backdrop-filter: blur(25px) saturate(150%);
      -webkit-backdrop-filter: blur(25px) saturate(150%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      opacity: 0;
      animation: fadeInUp 0.6s ease forwards, float 4s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      animation: shimmer 3s infinite;
    }
    
    .card:nth-child(2) { animation-delay: 0.15s; }

    .card h2 { 
      font-size: 1.1rem; 
      color: #f1f5f9; 
      margin-bottom: 1.5rem; 
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card h2 svg { color: #818cf8; width: 20px; height: 20px; }

    /* Info Rows */
    .info-row { 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      font-size: 0.9rem; 
      padding: 1rem 0; 
      border-bottom: 1px solid rgba(255, 255, 255, 0.06); 
    }
    .info-row:first-of-type { border-top: 1px solid rgba(255, 255, 255, 0.06); }
    .info-row:last-child { border-bottom: none; padding-bottom: 0; }
    
    .info-row span:first-child { color: #94a3b8; font-weight: 500; }
    .info-row span:last-child { 
      font-weight: 600; 
      font-family: 'Courier New', Courier, monospace; /* Monospace for hashes/balances */
      letter-spacing: -0.5px;
      word-break: break-all; 
      text-align: right; 
      max-width: 65%; 
      color: #38bdf8;
      background: rgba(56, 189, 248, 0.1);
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
    }

    /* Forms */
    label { 
      display: block; 
      font-size: 0.85rem; 
      color: #cbd5e1; 
      margin-bottom: 0.5rem; 
      margin-top: 1.2rem; 
      font-weight: 500;
    }

    .input-wrapper { position: relative; }
    
    input { 
      width: 100%; 
      padding: 0.9rem 1rem; 
      background: rgba(2, 6, 23, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1); 
      color: #f8fafc;
      border-radius: 12px; 
      font-size: 0.95rem; 
      font-family: 'Courier New', Courier, monospace;
      transition: all 0.3s ease;
    }

    input::placeholder { color: #475569; font-family: 'Inter', sans-serif; }

    input:focus { 
      outline: none; 
      border-color: #818cf8; 
      background: rgba(2, 6, 23, 0.6);
      box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.15);
    }

    /* Action Button */
    button.action-btn {
      margin-top: 1.8rem;
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #3b82f6, #2563eb, #7c3aed);
      background-size: 200% 200%;
      animation: shimmer 4s ease-in-out infinite;
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
      position: relative;
      overflow: hidden;
    }

    button.action-btn svg { width: 18px; height: 18px; transition: transform 0.3s; }

    button.action-btn:hover:not(:disabled) { 
      background: linear-gradient(135deg, #60a5fa, #3b82f6); 
      box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4);
    }
    
    button.action-btn:hover:not(:disabled) svg {
      transform: translateX(4px) translateY(-4px);
    }

    button.action-btn:disabled { 
      background: rgba(255, 255, 255, 0.05); 
      color: #64748b;
      cursor: not-allowed; 
    }

    /* Status Messages */
    #status { 
      margin-top: 1.2rem; 
      font-size: 0.85rem; 
      font-weight: 500;
      padding: 1rem; 
      border-radius: 12px; 
      display: none; 
      text-align: center;
      word-break: break-word;
      animation: fadeInUp 0.3s ease;
      position: relative;
    }

    #status.pending  { 
      background: rgba(234, 179, 8, 0.1); 
      color: #facc15; 
      border: 1px solid rgba(234, 179, 8, 0.2);
      display: flex; 
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    /* CSS Spinner for pending state */
    #status.pending::before {
      content: '';
      display: block;
      width: 14px;
      height: 14px;
      border: 2px solid #facc15;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    #status.success  { 
      background: rgba(34, 197, 94, 0.1); 
      color: #4ade80; 
      border: 1px solid rgba(34, 197, 94, 0.2);
      display: block; 
    }

    #status.error    { 
      background: rgba(239, 68, 68, 0.1); 
      color: #f87171; 
      border: 1px solid rgba(239, 68, 68, 0.2);
      display: block; 
    }

    /* Conditional Displays */
    #wallet-section { display: none; }

    #no-wallet {
      text-align: center;
      color: #94a3b8;
      padding: 4rem 2rem;
      border: 2px dashed rgba(255, 255, 255, 0.1);
      background: rgba(15, 23, 42, 0.3);
      box-shadow: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    #no-wallet svg { width: 48px; height: 48px; color: #475569; opacity: 0.5; }

  </style>
</head>
<body>

<header>
  <h1>
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
    </svg>
    MyToken DApp
  </h1>
  <button id="connect-btn">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" />
    </svg>
    <span>Connect Wallet</span>
  </button>
</header>

<main>
  <div id="wallet-section">
    <div class="card">
      <h2>
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
        Wallet Info
      </h2>
      <div class="info-row"><span>Address</span><span id="wallet-address">—</span></div>
      <div class="info-row"><span>Balance</span><span id="wallet-balance">—</span></div>
      <div class="info-row"><span>Token</span><span id="token-name">—</span></div>
    </div>

    <div class="card">
      <h2>
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0v12m0-12l-14 14" />
        </svg>
        Transfer Tokens
      </h2>
      <label for="recipient">Recipient Address</label>
      <div class="input-wrapper">
        <input id="recipient" type="text" placeholder="0x..." autocomplete="off" spellcheck="false" />
      </div>
      
      <label for="amount">Amount (MTK)</label>
      <div class="input-wrapper">
        <input id="amount" type="number" placeholder="100" min="1" />
      </div>
      
      <button class="action-btn" id="transfer-btn">
        <span>Send</span>
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
        </svg>
      </button>
      <div id="status"></div>
    </div>
  </div>

  <div id="no-wallet" class="card">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
    </svg>
    <p>Please connect your MetaMask wallet to access the DApp.</p>
  </div>
</main>

<script type="module">
  import { ethers } from "https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.min.js";

  // *** Paste your deployed contract address here after deploying ***
  const CONTRACT_ADDRESS = "0xc47ff5152a8bd3b3415e86c654364a018b4fc31e";

  const ABI = [
    { "inputs": [{ "internalType": "address", "name": "user", "type": "address" }], "name": "getBalance", "outputs": [{ "internalType": "uint256", "name": "", "type": "uint256" }], "stateMutability": "view", "type": "function" },
    { "inputs": [{ "internalType": "address", "name": "to", "type": "address" }, { "internalType": "uint256", "name": "amount", "type": "uint256" }], "name": "transfer", "outputs": [], "stateMutability": "nonpayable", "type": "function" },
    { "inputs": [], "name": "name", "outputs": [{ "internalType": "string", "name": "", "type": "string" }], "stateMutability": "view", "type": "function" },
    { "inputs": [], "name": "symbol", "outputs": [{ "internalType": "string", "name": "", "type": "string" }], "stateMutability": "view", "type": "function" },
    { "anonymous": false, "inputs": [{ "indexed": true, "internalType": "address", "name": "from", "type": "address" }, { "indexed": true, "internalType": "address", "name": "to", "type": "address" }, { "indexed": false, "internalType": "uint256", "name": "amount", "type": "uint256" }], "name": "Transfer", "type": "event" }
  ];

  const SEPOLIA_CHAIN_ID = "0xaa36a7";

  let provider, signer, contract;

  const connectBtn    = document.getElementById("connect-btn");
  const walletSection = document.getElementById("wallet-section");
  const noWallet      = document.getElementById("no-wallet");
  const statusEl      = document.getElementById("status");

  function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = type;
  }

  async function switchToSepolia() {
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: SEPOLIA_CHAIN_ID }],
    });
  }

  async function loadWalletInfo() {
    const address = await signer.getAddress();
    const balance = await contract.getBalance(address);
    const name    = await contract.name();
    const symbol  = await contract.symbol();

    document.getElementById("wallet-address").textContent = `${address.substring(0, 6)}...${address.substring(address.length - 4)}`;
    document.getElementById("wallet-balance").textContent = `${balance.toString()} ${symbol}`;
    document.getElementById("token-name").textContent = `${name}`;
  }

  async function connectWallet() {
    if (!window.ethereum) {
      alert("MetaMask not found. Please install it.");
      return;
    }

    await window.ethereum.request({ method: "eth_requestAccounts" });

    const chainId = await window.ethereum.request({ method: "eth_chainId" });
    if (chainId !== SEPOLIA_CHAIN_ID) {
      await switchToSepolia();
    }

    provider = new ethers.BrowserProvider(window.ethereum);
    signer   = await provider.getSigner();
    contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

    connectBtn.innerHTML = `
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
      </svg>
      <span>Connected</span>
    `;
    connectBtn.disabled = true;
    walletSection.style.display = "block";
    noWallet.style.display = "none";

    await loadWalletInfo();
  }

  document.getElementById("transfer-btn").addEventListener("click", async () => {
    const to     = document.getElementById("recipient").value.trim();
    const amount = document.getElementById("amount").value.trim();

    if (!ethers.isAddress(to)) {
      setStatus("Invalid recipient address.", "error");
      return;
    }
    if (!amount || Number(amount) <= 0) {
      setStatus("Enter a valid amount.", "error");
      return;
    }

    try {
      setStatus("Confirming transaction...", "pending");
      document.getElementById("transfer-btn").disabled = true;

      const tx = await contract.transfer(to, BigInt(amount));
      setStatus(`Pending... TX: ${tx.hash.substring(0,8)}...`, "pending");

      await tx.wait();
      setStatus(`Confirmed! TX: ${tx.hash.substring(0,8)}...`, "success");
      
      // Clear inputs
      document.getElementById("recipient").value = "";
      document.getElementById("amount").value = "";
      
      await loadWalletInfo();
    } catch (err) {
      setStatus(`Failed: ${err.reason ?? err.message}`, "error");
    } finally {
      document.getElementById("transfer-btn").disabled = false;
    }
  });

  function disconnectWallet() {
    connectBtn.innerHTML = `
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" />
      </svg>
      <span>Connect Wallet</span>
    `;
    connectBtn.disabled = false;
    walletSection.style.display = "none";
    noWallet.style.display = "block";
    provider = null;
    signer = null;
    contract = null;
  }

  connectBtn.addEventListener("click", connectWallet);

  // auto-reconnect if already authorized
  if (window.ethereum) {
    window.ethereum.request({ method: "eth_accounts" }).then(accounts => {
      if (accounts.length > 0) connectWallet();
    });

    // Listen for account changes
    window.ethereum.on('accountsChanged', (accounts) => {
      if (accounts.length === 0) {
        disconnectWallet();
      } else {
        // Account changed, reload info
        connectWallet();
      }
    });

    // Listen for disconnect
    window.ethereum.on('disconnect', () => {
      disconnectWallet();
    });
  }
</script>
</body>
</html>
